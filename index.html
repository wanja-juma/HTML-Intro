<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Intro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to HTML Intro</h1>
    <div>
        <h2>Login</h2>
        <img src="logo.png" alt=""><br>

        <label class="label" for="name">Name:</label> <br>
        <input class="input" type="text" id="name" placeholder="enter name"> <br>

        <label class="label" for="email">Email:</label><br>
        <input class="input" type="email" id="email" placeholder="enter email"> <br>

        <label class="label" for="password">Password:</label> <br>
        <input class="input" type="password" id="password" placeholder="password"><br>

        <label class="label" for="textarea">Message:</label> <br>
    
        <button type="submit">Sign Up</button>
    </div>
    <h3>about the website</h3>
    <p>This website is designed to introduce beginners to HTML basics.</p>
</body>
</html>
